    <text x="176" y="164" fill="#ededed" font-size="18" font-weight="600">Память диалога</text>

    <rect x="100" y="272" width="230" height="96" rx="16" fill="#1a1a1a" stroke="#2a2a2a"/>
    <g transform="translate(128,308)" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </g>
    <text x="176" y="326" fill="#ededed" font-size="18" font-weight="600">CRM клиентов</text>

    <rect x="100" y="434" width="230" height="96" rx="16" fill="#1a1a1a" stroke="#2a2a2a"/>
    <g transform="translate(128,470)" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/>
    </g>
    <text x="176" y="488" fill="#ededed" font-size="18" font-weight="600">Календарь</text>
  </g>

  <!-- правые инструменты -->
  <g>
    <rect x="870" y="110" width="230" height="96" rx="16" fill="#1a1a1a" stroke="#2a2a2a"/>
    <g transform="translate(898,146)" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/>
