<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="1198" height="638" rx="20" fill="#0b0b0b" stroke="#1f1f1f"/>
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="url(#dots)"/>
  <ellipse cx="600" cy="320" rx="170" ry="130" fill="#8b5cf6" opacity="0.13" filter="url(#glow)"/>

  <text x="600" y="56" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="3" fill="#c084fc" font-weight="600">ИИ-АГЕНТ С ИНСТРУМЕНТАМИ</text>

  <!-- связи -->
  <g fill="none" stroke="#8b5cf6" stroke-width="1.6" opacity="0.45">
    <path d="M461 292 C 405 292, 400 158, 330 158"/>
    <path d="M461 320 L 330 320"/>
    <path d="M461 348 C 405 348, 400 482, 330 482"/>
    <path d="M739 292 C 795 292, 800 158, 870 158"/>
    <path d="M739 320 L 870 320"/>
    <path d="M739 348 C 795 348, 800 482, 870 482"/>
  </g>
  <g fill="#8b5cf6">
    <circle cx="330" cy="158" r="3"/><circle cx="330" cy="320" r="3"/><circle cx="330" cy="482" r="3"/>
    <circle cx="870" cy="158" r="3"/><circle cx="870" cy="320" r="3"/><circle cx="870" cy="482" r="3"/>
  </g>

  <!-- центр: ИИ-агент -->
  <rect x="461" y="250" width="278" height="140" rx="16" fill="#1a1a1a" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="485" y="262" width="48" height="48" rx="12" fill="url(#grad)"/>
  <g transform="translate(497,274)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/>
    <path d="M9 2v2"/><path d="M15 2v2"/><path d="M9 20v2"/><path d="M15 20v2"/>
    <path d="M2 9h2"/><path d="M2 15h2"/><path d="M20 9h2"/><path d="M20 15h2"/>
  </g>
  <text x="485" y="342" fill="#ededed" font-size="22" font-weight="600">ИИ-агент</text>
  <text x="485" y="368" fill="#a1a1a1" font-size="13.5">память, планирование, рассуждение</text>

  <!-- левые инструменты -->
  <g>
    <rect x="100" y="110" width="230" height="96" rx="16" fill="#1a1a1a" stroke="#2a2a2a"/>
    <g transform="translate(128,146)" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
