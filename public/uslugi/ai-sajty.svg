<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="80"/></filter>
    <clipPath id="win"><rect x="150" y="76" width="900" height="520" rx="18"/></clipPath>
    <clipPath id="chat"><rect x="636" y="170" width="384" height="404" rx="16"/></clipPath>
  </defs>

  <rect x="1" y="1" width="1198" height="638" rx="20" fill="#0b0b0b" stroke="#1f1f1f"/>
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="url(#dots)"/>
  <ellipse cx="600" cy="330" rx="300" ry="200" fill="#8b5cf6" opacity="0.10" filter="url(#glow)"/>

  <text x="600" y="40" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="3" fill="#c084fc" font-weight="600">САЙТ С ИИ-ФУНКЦИЕЙ</text>

  <!-- окно браузера: сайт клиента со встроенным ИИ-чат-консультантом -->
  <g filter="url(#drop)">
    <rect x="150" y="76" width="900" height="520" rx="18" fill="#131313" stroke="#2a2a2a"/>
  </g>
  <g clip-path="url(#win)">
    <!-- шапка браузера: строка вкладок + панель навигации -->
    <rect x="150" y="76" width="900" height="72" fill="#181818"/>
    <rect x="150" y="76" width="900" height="38" fill="#0f0f0f"/>
    <path d="M162 114 v-22 a8 8 0 0 1 8-8 h176 a8 8 0 0 1 8 8 v22 z" fill="#181818"/>
    <circle cx="180" cy="99" r="6" fill="url(#grad)"/>
    <text x="196" y="103" fill="#ededed" font-size="12.5" font-weight="600">Ваш бизнес</text>
    <g transform="translate(334,95)" stroke="#8f8f8f" stroke-width="1.3" stroke-linecap="round"><path d="M0 0l7 7M7 0l-7 7"/></g>
    <g transform="translate(372,93)" stroke="#6b6b6b" stroke-width="1.5" stroke-linecap="round"><path d="M6 0v12M0 6h12"/></g>
    <!-- кнопки окна Windows: свернуть, развернуть, закрыть -->
    <g stroke="#c9c9c9" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M964 95h11"/>
      <rect x="996" y="90" width="10" height="10" rx="1"/>
      <path d="M1028 90l10 10M1038 90l-10 10"/>
    </g>
    <!-- навигация: назад, вперёд, обновить, домой -->
    <g fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <g transform="translate(172,124)" stroke="#b0b0b0"><path d="M13 6H1"/><path d="M6 1 1 6l5 5"/></g>
      <g transform="translate(200,124)" stroke="#565656"><path d="M1 6h12"/><path d="M8 1l5 5-5 5"/></g>
      <g transform="translate(228,123)" stroke="#b0b0b0"><path d="M13 6.5a5.5 5.5 0 1 1-1.6-3.9"/><path d="M13 1v4h-4"/></g>
      <g transform="translate(256,123)" stroke="#b0b0b0"><path d="M1 6l6-5 6 5"/><path d="M2.5 5.5v6.5h9V5.5"/></g>
    </g>
    <rect x="286" y="119" width="640" height="24" rx="12" fill="#0d0d0d" stroke="#262626"/>
    <g transform="translate(300,124)" stroke="#8f8f8f" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="5" width="9" height="6.5" rx="1.4"/><path d="M1.7 5V3.7a2.8 2.8 0 0 1 5.6 0V5"/>
    </g>
    <text x="320" y="135" fill="#8f8f8f" font-size="12.5" font-family="ui-monospace, monospace">vashbiznes.kz</text>
    <g transform="translate(902,125)" fill="none" stroke="#8f8f8f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 0.5l1.6 3.5 3.9.4-2.9 2.6.8 3.8L6 8.9 2.6 10.8l.8-3.8L.5 4.4l3.9-.4z"/></g>
    <g transform="translate(1010,123)" fill="#8f8f8f"><circle cx="0" cy="0" r="1.5"/><circle cx="0" cy="5.5" r="1.5"/><circle cx="0" cy="11" r="1.5"/></g>
    <line x1="150" y1="148" x2="1050" y2="148" stroke="#242424"/>

    <!-- сайт клиента (фон) -->
    <text x="190" y="200" fill="#ededed" font-size="17" font-weight="700">Ваш бизнес</text>
    <text x="470" y="199" fill="#8f8f8f" font-size="14">Услуги</text>
    <text x="548" y="199" fill="#8f8f8f" font-size="14">Цены</text>
    <text x="612" y="199" fill="#8f8f8f" font-size="14">Контакты</text>
    <text x="190" y="290" fill="#ededed" font-size="27" font-weight="700">Услуги и запись</text>
    <text x="190" y="326" fill="#ededed" font-size="27" font-weight="700">онлайн</text>
    <text x="190" y="366" fill="#a1a1a1" font-size="15">ИИ-консультант отвечает и оформляет заявки 24/7</text>
    <rect x="190" y="394" width="200" height="46" rx="12" fill="url(#grad)"/>
    <text x="290" y="423" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Оставить заявку</text>

    <!-- встроенный виджет ИИ-консультанта (по образцу ChatWidget.tsx) -->
    <rect x="636" y="170" width="384" height="404" rx="16" fill="#1a1a1a" stroke="#2a2a2a"/>
    <g clip-path="url(#chat)">
      <rect x="636" y="170" width="384" height="56" fill="#111111"/>
      <rect x="636" y="498" width="384" height="76" fill="#0b0b0b"/>
    </g>
    <line x1="636" y1="226" x2="1020" y2="226" stroke="#2a2a2a"/>
    <line x1="636" y1="498" x2="1020" y2="498" stroke="#2a2a2a"/>

    <!-- шапка виджета -->
    <text x="660" y="196" fill="#ededed" font-size="15" font-weight="600">ИИ-консультант</text>
    <text x="660" y="214" fill="#10b981" font-size="12">Онлайн</text>
    <g transform="translate(990,192)" stroke="#8f8f8f" stroke-width="1.5" stroke-linecap="round"><path d="M0 0l12 12M12 0l-12 12"/></g>

    <!-- приветствие ассистента -->
    <circle cx="660" cy="262" r="14" fill="#111111"/>
    <text x="660" y="267" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="600">V</text>
    <rect x="684" y="248" width="318" height="76" rx="14" fill="#111111"/>
    <text x="700" y="272" fill="#ededed" font-size="13.5">Здравствуйте! Я ИИ-консультант.</text>
    <text x="700" y="291" fill="#ededed" font-size="13.5">Помогу с услугами, ценами и записью.</text>
    <text x="700" y="310" fill="#ededed" font-size="13.5">Что вас интересует?</text>

    <!-- сообщение посетителя -->
    <rect x="800" y="340" width="202" height="36" rx="14" fill="url(#grad)"/>
    <text x="986" y="363" text-anchor="end" fill="#ffffff" font-size="13.5">Работаете в субботу?</text>

    <!-- ответ ассистента -->
    <circle cx="660" cy="406" r="14" fill="#111111"/>
    <text x="660" y="411" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="600">V</text>
    <rect x="684" y="392" width="318" height="76" rx="14" fill="#111111"/>
    <text x="700" y="416" fill="#ededed" font-size="13.5">Да, в субботу с 9:00 до 18:00.</text>
    <text x="700" y="435" fill="#ededed" font-size="13.5">Оформить заявку? Оставьте имя</text>
    <text x="700" y="454" fill="#ededed" font-size="13.5">и телефон.</text>

    <!-- поле ввода -->
    <rect x="656" y="508" width="344" height="36" rx="12" fill="#111111"/>
    <text x="674" y="531" fill="#8f8f8f" font-size="13.5">Задайте вопрос...</text>
    <text x="922" y="533" font-size="16">😊</text>
    <rect x="958" y="512" width="28" height="28" rx="8" fill="#8b5cf6"/>
    <g transform="translate(965,519)" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 0L0 5l6 2 1 6z"/></g>
    <text x="828" y="562" text-anchor="middle" fill="#8f8f8f" font-size="9.5">ИИ-консультант может ошибаться, уточните детали у менеджера</text>
  </g>
</svg>
