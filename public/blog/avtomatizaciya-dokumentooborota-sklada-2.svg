<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- фон -->
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="#0b0b0b" stroke="#1f1f1f"/>
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="url(#dots)"/>
  <ellipse cx="600" cy="320" rx="320" ry="180" fill="#8b5cf6" opacity="0.14" filter="url(#glow)"/>

  <text x="600" y="40" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="3" fill="#c084fc" font-weight="600">СВЯЗКА ПОД ЗАДАЧУ: ЗАЯВКА ПРЕВРАЩАЕТСЯ В ДОКУМЕНТ</text>

  <!-- узел 1: заявка -->
  <g filter="url(#drop)">
    <rect x="100" y="240" width="220" height="160" rx="20" fill="#141414" stroke="#2a2a2a"/>
  </g>
  <circle cx="210" cy="288" r="22" fill="url(#grad)"/>
  <g transform="translate(198,276)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 11.5a8.38 8.38 0 0 1-9 8.35 8.5 8.5 0 0 1-3.9-.95L3 20l1.1-5.1A8.38 8.38 0 0 1 3.15 11a8.5 8.5 0 0 1 8.35-9 8.38 8.38 0 0 1 9.5 9.5z" transform="scale(0.95)"/>
  </g>
  <text x="210" y="344" text-anchor="middle" fill="#ededed" font-size="17" font-weight="600">Заявка</text>
  <text x="210" y="368" text-anchor="middle" fill="#a1a1a1" font-size="13">клиент пишет в WhatsApp</text>

  <!-- стрелка 1 -->
  <line x1="320" y1="320" x2="348" y2="320" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="360,320 346,313 346,327" fill="#8b5cf6"/>

  <!-- узел 2: проверка остатка -->
  <g filter="url(#drop)">
    <rect x="360" y="240" width="220" height="160" rx="20" fill="#141414" stroke="#2a2a2a"/>
  </g>
  <circle cx="470" cy="288" r="22" fill="url(#grad)"/>
  <g transform="translate(458,276)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3"/><path d="M21 8H3v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8z"/><path d="M9 12h6"/>
  </g>
  <text x="470" y="344" text-anchor="middle" fill="#ededed" font-size="17" font-weight="600">Остаток</text>
  <text x="470" y="368" text-anchor="middle" fill="#a1a1a1" font-size="13">проверен и списан</text>

  <!-- стрелка 2 -->
  <line x1="580" y1="320" x2="608" y2="320" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="620,320 606,313 606,327" fill="#8b5cf6"/>

  <!-- узел 3: накладная -->
  <g filter="url(#drop)">
    <rect x="620" y="240" width="220" height="160" rx="20" fill="#141414" stroke="#2a2a2a"/>
  </g>
  <circle cx="730" cy="288" r="22" fill="url(#grad)"/>
  <g transform="translate(718,276)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/>
  </g>
  <text x="730" y="344" text-anchor="middle" fill="#ededed" font-size="17" font-weight="600">Накладная</text>
  <text x="730" y="368" text-anchor="middle" fill="#a1a1a1" font-size="13">создана по шаблону</text>

  <!-- стрелка 3 -->
  <line x1="840" y1="320" x2="868" y2="320" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="880,320 866,313 866,327" fill="#8b5cf6"/>

  <!-- узел 4: уведомление -->
  <g filter="url(#drop)">
    <rect x="880" y="240" width="220" height="160" rx="20" fill="#141414" stroke="#2a2a2a"/>
  </g>
  <circle cx="990" cy="288" r="22" fill="url(#grad)"/>
  <g transform="translate(978,276)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
  </g>
  <text x="990" y="344" text-anchor="middle" fill="#ededed" font-size="17" font-weight="600">Владельцу</text>
  <text x="990" y="368" text-anchor="middle" fill="#a1a1a1" font-size="13">отчет в Telegram</text>

  <!-- подпись -->
  <rect x="410" y="472" width="380" height="44" rx="14" fill="#141414" stroke="#2a2a2a"/>
  <text x="600" y="500" text-anchor="middle" fill="#a1a1a1" font-size="14.5">собирается на n8n или Make без ручной работы</text>
</svg>
