<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- фон -->
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="#0b0b0b" stroke="#1f1f1f"/>
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="url(#dots)"/>
  <ellipse cx="600" cy="330" rx="280" ry="200" fill="#8b5cf6" opacity="0.14" filter="url(#glow)"/>

  <text x="600" y="40" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="3" fill="#c084fc" font-weight="600">СВОЙ БОТ: ЗАПИСЬ ПО КНОПКАМ</text>

  <!-- окно чата -->
  <g filter="url(#drop)">
    <rect x="280" y="76" width="640" height="520" rx="24" fill="#141414" stroke="#2a2a2a"/>
  </g>

  <!-- шапка -->
  <circle cx="326" cy="121" r="22" fill="url(#grad)"/>
  <g transform="translate(314,109)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
  </g>
  <text x="362" y="116" fill="#ededed" font-size="19" font-weight="600">Бот барбершопа</text>
  <circle cx="367" cy="134" r="4" fill="#10b981"/>
  <text x="379" y="139" fill="#a1a1a1" font-size="13.5">онлайн</text>
  <line x1="280" y1="158" x2="920" y2="158" stroke="#242424"/>

  <!-- бот: выбор услуги -->
  <rect x="304" y="178" width="200" height="50" rx="16" fill="#1f1f1f"/>
  <text x="324" y="209" fill="#ededed" font-size="16.5">Выберите услугу:</text>

  <!-- кнопки услуг -->
  <rect x="304" y="240" width="110" height="40" rx="12" fill="#191919" stroke="#3a3a3a"/>
  <text x="359" y="265" text-anchor="middle" fill="#c084fc" font-size="14.5">Стрижка</text>
  <rect x="426" y="240" width="100" height="40" rx="12" fill="#191919" stroke="#3a3a3a"/>
  <text x="476" y="265" text-anchor="middle" fill="#c084fc" font-size="14.5">Бритье</text>
  <rect x="538" y="240" width="100" height="40" rx="12" fill="#191919" stroke="#3a3a3a"/>
  <text x="588" y="265" text-anchor="middle" fill="#c084fc" font-size="14.5">Комбо</text>

  <!-- клиент: услуга -->
  <rect x="794" y="240" width="102" height="46" rx="16" fill="url(#grad)"/>
  <text x="845" y="269" text-anchor="middle" fill="#ffffff" font-size="16.5">Стрижка</text>

  <!-- бот: свободное время -->
  <rect x="304" y="306" width="330" height="78" rx="16" fill="#1f1f1f"/>
  <text x="324" y="337" fill="#ededed" font-size="16.5">Свободно сегодня: 15:00, 17:30,</text>
  <text x="324" y="365" fill="#ededed" font-size="16.5">19:00. Какое время удобно?</text>

  <!-- клиент: время -->
  <rect x="813" y="400" width="83" height="46" rx="16" fill="url(#grad)"/>
  <text x="854" y="429" text-anchor="middle" fill="#ffffff" font-size="16.5">17:30</text>

  <!-- бот: подтверждение -->
  <rect x="304" y="462" width="410" height="50" rx="16" fill="#1f1f1f"/>
  <text x="324" y="493" fill="#ededed" font-size="16.5">Записал на 17:30 к Ерлану. Напомню за час</text>

  <!-- поле ввода -->
  <rect x="304" y="528" width="592" height="48" rx="24" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="330" y="558" fill="#8f8f8f" font-size="15">Сообщение…</text>
  <circle cx="870" cy="552" r="19" fill="url(#grad)"/>
  <g transform="translate(860,542)" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 2 11 13" transform="scale(0.85)"/><path d="M22 2 15 22 11 13 2 9 22 2z" transform="scale(0.85)"/>
  </g>
</svg>
