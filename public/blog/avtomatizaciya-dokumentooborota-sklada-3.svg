<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- фон -->
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="#0b0b0b" stroke="#1f1f1f"/>
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="url(#dots)"/>
  <ellipse cx="600" cy="330" rx="280" ry="200" fill="#8b5cf6" opacity="0.14" filter="url(#glow)"/>

  <text x="600" y="40" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="3" fill="#c084fc" font-weight="600">ИИ-АГЕНТ: ЗАЯВКА РАЗОБРАНА, НАКЛАДНАЯ ГОТОВА</text>

  <!-- окно чата -->
  <g filter="url(#drop)">
    <rect x="280" y="76" width="640" height="520" rx="24" fill="#141414" stroke="#2a2a2a"/>
  </g>

  <!-- шапка -->
  <circle cx="326" cy="121" r="22" fill="url(#grad)"/>
  <g transform="translate(314,109)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2v4"/><path d="M9 6h6a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3V9a3 3 0 0 1 3-3z"/><circle cx="10" cy="12" r="0.8"/><circle cx="14" cy="12" r="0.8"/>
  </g>
  <text x="362" y="116" fill="#ededed" font-size="19" font-weight="600">ИИ-агент склада</text>
  <circle cx="367" cy="134" r="4" fill="#10b981"/>
  <text x="379" y="139" fill="#a1a1a1" font-size="13.5">онлайн</text>
  <line x1="280" y1="158" x2="920" y2="158" stroke="#242424"/>

  <!-- клиент: свободная заявка -->
  <rect x="556" y="178" width="340" height="106" rx="16" fill="url(#grad)"/>
  <text x="726" y="209" text-anchor="middle" fill="#ffffff" font-size="16.5">Нужно 40 коробок плитки,</text>
  <text x="726" y="237" text-anchor="middle" fill="#ffffff" font-size="16.5">как в прошлый раз,</text>
  <text x="726" y="265" text-anchor="middle" fill="#ffffff" font-size="16.5">отгрузка в пятницу</text>

  <!-- агент: разбор, проверка, документ -->
  <rect x="304" y="300" width="380" height="106" rx="16" fill="#1f1f1f"/>
  <text x="324" y="331" fill="#ededed" font-size="16.5">Нашел ваш прошлый заказ. Остаток</text>
  <text x="324" y="359" fill="#ededed" font-size="16.5">проверил: 56 коробок, хватает.</text>
  <text x="324" y="387" fill="#ededed" font-size="16.5">Сформировал накладную на 40.</text>

  <!-- клиент: подтверждение -->
  <rect x="746" y="422" width="150" height="46" rx="16" fill="url(#grad)"/>
  <text x="821" y="451" text-anchor="middle" fill="#ffffff" font-size="16.5">Подтверждаю</text>

  <!-- агент: действие -->
  <rect x="304" y="484" width="404" height="50" rx="16" fill="#1f1f1f"/>
  <text x="324" y="515" fill="#ededed" font-size="16.5">Отгрузка в пятницу. Счет ушел клиенту</text>

  <!-- теги возможностей -->
  <rect x="304" y="548" width="164" height="40" rx="12" fill="#191919" stroke="#3a3a3a"/>
  <text x="386" y="573" text-anchor="middle" fill="#c084fc" font-size="14.5">свободный текст</text>
  <rect x="480" y="548" width="188" height="40" rx="12" fill="#191919" stroke="#3a3a3a"/>
  <text x="574" y="573" text-anchor="middle" fill="#c084fc" font-size="14.5">помнит прошлый заказ</text>
  <rect x="680" y="548" width="150" height="40" rx="12" fill="#191919" stroke="#3a3a3a"/>
  <text x="755" y="573" text-anchor="middle" fill="#c084fc" font-size="14.5">связь со складом</text>
</svg>
